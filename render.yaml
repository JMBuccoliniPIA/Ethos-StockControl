services:
  - type: web
    name: ethos-stock-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:shared && cd apps/api && npx nest build
    startCommand: cd apps/api && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_CORS_ORIGIN
        sync: false  # Set manually in Render dashboard
      - key: MONGODB_URI
        sync: false  # Set manually — MongoDB Atlas connection string
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: "15m"
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRATION
        value: "7d"
